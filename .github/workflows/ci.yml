name: CI

# Deployment is handled by Cloudflare Pages (connected to this repo):
# it builds `npm run build` → `dist` on every push, with per-push preview
# URLs. This workflow is the correctness gate: lint → test → build.
on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
