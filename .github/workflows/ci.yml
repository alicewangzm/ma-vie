name: CI

# Deployment is handled by Cloudflare Workers Builds (connected to this
# repo): it runs `npm run build` then `wrangler deploy` on every push,
# with preview URLs for non-production branches. This workflow is the
# correctness gate: lint → test → build.
on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
